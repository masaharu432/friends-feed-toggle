<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1 data-i18n="popupTitle"></h1>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="track"><span class="thumb"></span></span>
    </label>
    <p id="state" class="state"></p>
    <label class="row">
      <span data-i18n="zoomLabel"></span>
      <span class="switch small">
        <input type="checkbox" id="zoom">
        <span class="track"><span class="thumb"></span></span>
      </span>
    </label>
    <div class="row">
      <span data-i18n="zoomFactorLabel"></span>
      <span id="factorValue" class="factor-value"></span>
    </div>
    <input type="range" id="factor" min="100" max="250" step="5" value="130">
    <p class="note" data-i18n="popupNote"></p>
    <p id="diag" class="diag"></p>
    <button id="dump" class="dump-btn" data-i18n="dumpButton"></button>
    <p id="version" class="version"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
