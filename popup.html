<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1 data-i18n="popupTitle"></h1>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="track"><span class="thumb"></span></span>
    </label>
    <p id="state" class="state"></p>
    <label class="row">
      <span data-i18n="zoomLabel"></span>
      <span class="switch small">
        <input type="checkbox" id="zoom">
        <span class="track"><span class="thumb"></span></span>
      </span>
    </label>
    <label class="row">
      <span data-i18n="zoomFactorLabel"></span>
      <select id="factor">
        <option value="auto" data-i18n="zoomAuto"></option>
        <option value="1">100%</option>
        <option value="1.1">110%</option>
        <option value="1.2">120%</option>
        <option value="1.3">130%</option>
        <option value="1.4">140%</option>
        <option value="1.6">160%</option>
        <option value="1.8">180%</option>
        <option value="2">200%</option>
      </select>
    </label>
    <p class="note" data-i18n="popupNote"></p>
    <p id="diag" class="diag"></p>
    <p id="version" class="version"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
